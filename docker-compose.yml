version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: grpc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grpcuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grpcpass}
      POSTGRES_DB: ${POSTGRES_DB:-grpcdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grpcuser} -d ${POSTGRES_DB:-grpcdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: grpc-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-grpcuser}:${POSTGRES_PASSWORD:-grpcpass}@postgres:5432/${POSTGRES_DB:-grpcdb}
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: grpc-web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data: